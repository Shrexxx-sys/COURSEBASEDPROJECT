<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        /* Apply the Inter font to the whole page */
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Animation Keyframes (can be reused) */
        @keyframes slide-out-block {
            0% {
                transform: translateX(0%);
            }
            100% {
                transform: translateX(101%);
            }
        }

        @keyframes fade-in-content {
            0% {
                opacity: 0;
            }
            50% { /* Start fading in when the block is halfway across */
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* NEW Animation CSS */
        .animated-reveal {
            position: relative;
            display: inline-block; /* Crucial for making the reveal block fit the content width */
            overflow: hidden;
        }

        /* Hide the content initially to prevent flash of unstyled content */
        .animated-reveal > * {
           visibility: hidden;
        }

        /* The sliding white block */
        .animated-reveal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(248, 250, 252, 0.2); /* Using a translucent white color */
            z-index: 2;
            /* Base animation */
            animation: slide-out-block 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        /* The content that will be revealed */
        .animated-reveal > * {
           visibility: visible;
           opacity: 0;
           /* Base animation */
           animation: fade-in-content 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        /* Staggered Delay Classes */
        .stagger-1::before, .stagger-1 > * { animation-delay: 0.1s; }
        .stagger-2::before, .stagger-2 > * { animation-delay: 0.3s; }
        .stagger-3::before, .stagger-3 > * { animation-delay: 0.5s; }
        .stagger-4::before, .stagger-4 > * { animation-delay: 0.7s; }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <!-- Main content container -->
    <main class="min-h-screen flex flex-col justify-center p-8 sm:p-16 lg:p-24">
        <div class="max-w-5xl">
            <div class="mb-8">
                <!-- Each animated element is wrapped in a div with the animation classes -->
                <div class="animated-reveal stagger-1">
                    <h1 class="text-7xl sm:text-8xl lg:text-9xl font-black tracking-tighter text-white">Subscribe</h1>
                </div>
                <div class="animated-reveal stagger-2">
                    <!-- Red underline element -->
                    <div class="h-2 bg-red-600 mt-4 w-1/2 sm:w-1/3 lg:w-1/4"></div>
                </div>
            </div>

            <div class="animated-reveal stagger-3 mb-8">
                <h2 class="text-4xl sm:text-5xl lg:text-6xl font-semibold tracking-tight text-white">
                    Speak. Transcribe. Done.
                </h2>
            </div>

            <div class="animated-reveal stagger-4">
                <p class="text-xl sm:text-2xl lg:text-3xl text-gray-300 leading-relaxed max-w-3xl">
                    Just speak naturally and watch your words appear as editable text in real-time. No downloads, no delays, no hassle, just everything happening instantly.
                </p>
            </div>
        </div>

        <a href="transcript.html" class="fixed bottom-8 right-8 bg-red-600 text-white font-semibold px-6 py-3 rounded-lg hover:bg-red-700 transition-colors duration-300 text-lg shadow-lg flex items-center justify-center">
            Start Transcription
        </a>
    </main>

</body>
</html>
